# Httpbin 是 HTTP 调试服务，稳定性取决于服务端状态
# 如遇 503 为服务暂时不可用，不影响框架本身

- name: "Httpbin-GET请求验证"
  tags: ["httpbin", "positive"]
  allure:
    epic: "Httpbin"
    feature: "调试工具"
    story: "GET请求验证"
  request:
    method: GET
    url: "https://httpbin.org/get"
    params:
      key: value
  assert:
    status_code: 200

- name: "Httpbin-POST请求验证"
  tags: ["httpbin", "positive"]
  allure:
    epic: "Httpbin"
    feature: "调试工具"
    story: "POST请求验证"
  request:
    method: POST
    url: "https://httpbin.org/post"
    json:
      test: data
  assert:
    status_code: 200
