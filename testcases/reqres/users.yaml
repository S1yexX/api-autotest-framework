# Reqres 现在要求 API Key（免费申请: https://app.reqres.in/api-keys）
# 在 headers 中添加 x-api-key 即可使用
# 以下用例使用 reqres.in 的公开 API（可能需要 API Key）

- name: "Reqres-获取单用户"
  tags: ["reqres", "positive"]
  allure:
    epic: "Reqres"
    feature: "用户查询"
    story: "根据ID查询用户"
  request:
    method: GET
    url: "https://reqres.in/api/users/2"
  assert:
    status_code: 200

- name: "Reqres-获取用户列表"
  tags: ["reqres", "positive"]
  allure:
    epic: "Reqres"
    feature: "用户查询"
    story: "获取用户列表"
  request:
    method: GET
    url: "https://reqres.in/api/users"
    params:
      page: 2
  assert:
    status_code: 200

- name: "Reqres-创建用户-正常场景"
  tags: ["reqres", "positive"]
  allure:
    epic: "Reqres"
    feature: "用户管理"
    story: "创建用户"
  request:
    method: POST
    url: "https://reqres.in/api/users"
    json:
      name: "morpheus"
      job: "leader"
  extract:
    - name: reqres_user_id
      jsonpath: "$.id"
  assert:
    status_code: 201
    json:
      name: "morpheus"

- name: "Reqres-查询不存在的用户-异常场景"
  tags: ["reqres", "negative"]
  allure:
    epic: "Reqres"
    feature: "用户查询"
    story: "异常查询"
  request:
    method: GET
    url: "https://reqres.in/api/users/99999"
  assert:
    status_code: 404
