- name: "查询全部用户"
  tags: ["smoke", "users", "positive"]
  allure:
    epic: "JSONPlaceholder"
    feature: "用户管理"
    story: "获取用户列表"
  request:
    method: GET
    url: "/users"
  assert:
    status_code: 200

- name: "查询单个用户详情"
  tags: ["users", "positive"]
  allure:
    epic: "JSONPlaceholder"
    feature: "用户管理"
    story: "查询用户详情"
  request:
    method: GET
    url: "/users/1"
  assert:
    status_code: 200
    json:
      id: 1

- name: "查询不存在的用户-异常场景"
  tags: ["negative", "users"]
  allure:
    epic: "JSONPlaceholder"
    feature: "用户管理"
    story: "异常查询"
  request:
    method: GET
    url: "/users/99999"
  assert:
    status_code: 404

- name: "创建用户-正常场景"
  tags: ["users", "positive"]
  allure:
    epic: "JSONPlaceholder"
    feature: "用户管理"
    story: "新增用户"
  request:
    method: POST
    url: "/users"
    json:
      name: "测试用户"
      username: "testuser"
      email: "test@example.com"
  extract:
    - name: user_id
      jsonpath: "$.id"
  assert:
    status_code: 201
